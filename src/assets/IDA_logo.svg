<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 232 100">
  <!-- I: rounded rectangle -->
  <rect x="5" y="0" width="38" height="100" rx="10" fill="#555"/>

  <!-- D: thick arc with flat end-caps, hollow C-shape -->
  <path
    fill="none"
    stroke="#555"
    stroke-width="22"
    stroke-linecap="butt"
    d="M 78 11 A 39 39 0 1 1 78 89"
  />

  <!-- A: two strokes, no crossbar, rounded join/caps -->
  <path
    fill="none"
    stroke="#555"
    stroke-width="21"
    stroke-linecap="round"
    stroke-linejoin="round"
    d="M 143 100 L 187 2 L 232 100"
  />
</svg>
